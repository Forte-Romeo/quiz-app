<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
</head>
<body>
    <div class="container">
        <!-- START SCREEN -->
        <div id="start-screen" class="screen active">

            <div class="card">
                <h1>Quiz Challenge</h1>
                <p class="subtitle">
                    Test your knowledge and see how well you score.
                </p>

                <div class="quiz-info">
                    <div class="info-box">
                        <h3>10</h3>
                        <span>Questions</span>
                    </div>

                    <div class="info-box">
                        <h3>5</h3>
                        <span>Minutes</span>
                    </div>

                    <div class="info-box">
                        <h3>100</h3>
                        <span>Points</span>
                    </div>

                </div>

                <button id="start-btn" class="btn">
                    Start Quiz
                </button>

            </div>

        </div>

        <!-- QUIZ SCREEN -->
        <div id="quiz-screen" class="screen">
            <div class="card">

                <!-- Header -->
                <div class="quiz-header">
                    <div class="question-counter">
                        Question <span id="current-question">1</span>
                        of
                        <span id="total-questions">10</span>
                    </div>

                    <div id="timer" class="timer">
                        05:00
                    </div>
                </div>

                <!-- Progress Bar -->
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>

                <!-- Question -->
                <div class="question-container">
                    <h2 id="question-text">
                        <!-- Question appears here... -->
                    </h2>
                </div>

                <!-- Options -->
                <div id="answer-buttons" class="answers-container">
                    <!-- Generated by JavaScript -->
                </div>

                <!-- Navigation -->
                <div class="quiz-footer">
                    <button id="next-btn" class="btn" disabled>
                        Next Question
                    </button>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
