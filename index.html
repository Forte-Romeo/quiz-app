<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
</head>
<body>
    <div class="container">
        <!-- START SCREEN -->
        <div id="start-screen" class="screen active">

            <div class="card">
                <h1>Quiz Challenge</h1>
                <p class="subtitle">
                    Test your knowledge and see how well you score.
                </p>

                <div class="quiz-info">
                    <div class="info-box">
                        <h3>10</h3>
                        <span>Questions</span>
                    </div>

                    <div class="info-box">
                        <h3>5</h3>
                        <span>Minutes</span>
                    </div>

                    <div class="info-box">
                        <h3>100</h3>
                        <span>Points</span>
                    </div>

                </div>

                <button id="start-btn" class="btn">
                    Start Quiz
                </button>

            </div>

        </div>
    </div>

</body>
</html>
